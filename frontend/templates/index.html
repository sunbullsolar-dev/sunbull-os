<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============= ROUTER COMPONENT =============
        function HashRouter({ children }) {
            const [hash, setHash] = useState(window.location.hash.slice(1) || '/');

            useEffect(() => {
                const handleHashChange = () => setHash(window.location.hash.slice(1) || '/');
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const navigate = (path) => { window.location.hash = path; };

            return children({ hash, navigate });
        }

        // ============= API SERVICE =============
        const api = {
            post: async (url, body) => {
                const token = window.authToken;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token && { 'Authorization': `Bearer ${token}` })
                    },
                    body: JSON.stringify(body)
                });
                if (response.status === 401) { window.authToken = null; window.location.hash = '/login'; }
                return response.json();
            },
            get: async (url) => {
                const token = window.authToken;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { ...(token && { 'Authorization': `Bearer ${token}` }) }
                });
                if (response.status === 401) { window.authToken = null; window.location.hash = '/login'; }
                return response.json();
            }
        };

        // ============= TOAST COMPONENT =============
        function Toast({ message, type = 'info', onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            return (
                <div className={`toast ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg`}>
                    {message}
                </div>
            );
        }

                            <button onClick={() => navigate('/upload')} style={{marginTop:'24px', background:'none', border:'none', color:'#06c', fontSize:'15px', fontWeight:500, cursor:'pointer', fontFamily:'inherit'}}>
                                Find out in 2 minutes →
                            </button>
                        </div>
                    </div>

                    <div className="divider" style={{maxWidth:'680px', margin:'0 auto'}}></div>

                    {/* How It Works */}
                    <div id="how-section" className="section" style={{background:'#fff'}}>
                        <div className="section-inner" style={{textAlign:'center'}}>
                            <h2 className="headline-lg" style={{color:'#1d1d1f'}}>How it works.</h2>
                            <p className="body-lg" style={{marginTop:'12px'}}>No paperwork. No phone calls. Just answers.</p>
                            <div style={{marginTop:'40px', display:'flex', flexDirection:'column', gap:'1px', background:'rgba(0,0,0,0.04)', borderRadius:'20px', overflow:'hidden'}}>
                                {[
                                    { n: '01', title: 'Enter your electric bill', desc: 'Tell us what you pay each month. That\'s the only number we need.' },

                                        <div>
                                            <h3 style={{fontSize:'17px', fontWeight:600, color:'#1d1d1f', letterSpacing:'-0.01em'}}>{step.title}</h3>
                                            <p style={{fontSize:'15px', color:'#86868b', marginTop:'4px', lineHeight:1.4}}>{step.desc}</p>

                            <div style={{marginTop:'36px'}}>
                                <button onClick={() => navigate('/upload')} className="btn-primary" style={{minWidth:'200px'}}>Analyze My Bill</button>

                    <div className="divider" style={{maxWidth:'680px', margin:'0 auto'}}></div>

                    {/* Trust + Social Proof */}

                                We've analyzed thousands of bills across the San Fernando Valley. We know what the utilities charge — and how to beat it.
                            </p>

                            {/* Stats */}
                            <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'16px', marginTop:'40px', marginBottom:'48px'}}>

        // ============= BILL UPLOAD COMPONENT =============
        function BillUpload({ navigate, publicData, setPublicData }) {
            const [formData, setFormData] = useState(publicData.formData || {
                firstName: '', lastName: '', phone: '', email: '',
                streetAddress: '', city: '', state: 'AZ', zipCode: '',
                utilityCompany: '', monthlyBill: '', costPerKwh: '0.13'
            });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [loadingPhase, setLoadingPhase] = useState(0);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.firstName || !formData.lastName || !formData.phone ||
                    !formData.streetAddress || !formData.city || !formData.state ||
                    !formData.zipCode || !formData.monthlyBill) {
                    setError('Please fill in all required fields');
                    return;
                }

                setLoading(true);
                setError('');
                setLoadingPhase(0);

                // Animate through loading phases
                const t1 = setTimeout(() => setLoadingPhase(1), 800);
                const t2 = setTimeout(() => setLoadingPhase(2), 1600);

                try {
                    // Map camelCase form fields to snake_case API fields
                    const payload = {
                        first_name: formData.firstName,
                        last_name: formData.lastName,
                        phone: formData.phone,
                        email: formData.email || undefined,
                        property_address: formData.streetAddress,
                        city: formData.city,
                        state: formData.state,
                        zip_code: formData.zipCode,
                        utility_company: formData.utilityCompany || undefined,
                        average_monthly_bill: parseFloat(formData.monthlyBill),
                        cost_per_kwh: parseFloat(formData.costPerKwh) || 0.13,
                    };

                    const response = await fetch('/api/solar/full-analysis', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    const data = await response.json();

                    if (data.lead_id) {
                        setPublicData(prev => ({ ...prev, formData, analysis: data }));
                        // Brief pause so user sees "Generating your plan..."
                        setTimeout(() => navigate('/savings'), 400);
                    } else {
                        setError(data.detail || 'Something went wrong. Please try again.');
                        setLoading(false);
                    }
                } catch (err) {
                    setError('Connection error. Please check your internet and try again.');
                    setLoading(false);
                }
                clearTimeout(t1); clearTimeout(t2);
            };

            const loadingMessages = [
                'Reading your bill details...',
                'Comparing your rate to local options...',
                'Putting your numbers together...'
            ];

            // Full-screen loading overlay
            if (loading) {
                return (
                    <div style={{paddingTop:'56px', minHeight:'100vh', background:'#fff', display:'flex', alignItems:'center', justifyContent:'center'}}>
                        <div style={{textAlign:'center', maxWidth:'320px'}}>
                            <div className="spinner" style={{ width:'40px', height:'40px', margin:'0 auto' }}></div>
                            <p style={{fontSize:'17px', fontWeight:600, color:'#1d1d1f', marginTop:'24px'}}>{loadingMessages[loadingPhase]}</p>
                            <p style={{fontSize:'13px', color:'#86868b', marginTop:'8px'}}>This only takes a moment</p>
                            <div style={{display:'flex', justifyContent:'center', gap:'6px', marginTop:'20px'}}>
                                {[0,1,2].map(i => (
                                    <div key={i} style={{width:'8px', height:'8px', borderRadius:'50%', background: i <= loadingPhase ? '#FF9F0A' : 'rgba(0,0,0,0.06)'}}></div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const labelStyle = {display:'block', fontSize:'12px', fontWeight:600, color:'#86868b', marginBottom:'6px', letterSpacing:'0.02em'};

            return (

            const monthlySavings = a.monthly_payment ? (a.current_monthly_bill - a.monthly_payment) : 0;

            // Generate next 14 days (Mon-Sat only)
            const getAvailableDates = () => {
                const dates = [];
                const today = new Date();
                for (let i = 1; i <= 21; i++) {
                    const date = new Date(today);
                    date.setDate(date.getDate() + i);
                    if (date.getDay() !== 0) { // Skip Sundays
                        dates.push(date);
                    }
                }
                return dates.slice(0, 12);
            };

            // Time slots with 24hr values for backend, display labels for user
            const timeSlots = [
                { label: '9:00 AM', value: '09:00' },
                { label: '10:00 AM', value: '10:00' },

                { label: '12:00 PM', value: '12:00' },
                { label: '1:00 PM', value: '13:00' },
                { label: '2:00 PM', value: '14:00' },
                { label: '3:00 PM', value: '15:00' },
                { label: '4:00 PM', value: '16:00' },
            ];
            const availableDates = getAvailableDates();

                if (!selectedDate || !selectedTime) {
                    setError('Please select a date and time');
                    return;
                }

                setLoading(true);
                setError('');
                try {
                    const response = await api.post('/api/solar/book-appointment', {
                        lead_id: publicData.analysis.lead_id,
                        preferred_date: selectedDate.toISOString().split('T')[0],
                        preferred_time: selectedTime.value,
                        notes: notes
                    });

                    if (response.appointment_id || response.success) {
                        setSuccess(true);
                        setPublicData(prev => ({
                            ...prev,
                            booking: response

        // ============= LOGIN PAGE =============
        function LoginPage({ navigate, setUser }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [toast, setToast] = useState(null);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    const response = await api.post('/api/auth/login', { email, password });
                    if (response.access_token) {
                        window.authToken = response.access_token;
                        const userData = { name: response.name, role: response.role, id: response.id };
                        setUser(userData);

                        if (response.role === 'admin') navigate('/admin/dashboard');
                        else if (response.role === 'rep') navigate('/rep/dashboard');
                        else if (response.role === 'confirmation') navigate('/confirmation/queue');
                        else navigate('/');
                    } else {
                        setError(response.detail || 'Login failed');
                        setToast({ type: 'error', message: 'Invalid credentials' });
                    }
                } catch (err) {
                    setError('Connection error');
                    setToast({ type: 'error', message: 'Failed to connect to server' });
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-amber-50 to-orange-50 flex items-center justify-center px-4">

                                    type="password"

                            <button

        function PipelineFunnelChart() {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !window.Chart) return;

                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Sold', 'Installed', 'Submitted', 'Funded', 'Paid'],
                        datasets: [{
                            label: 'Deals',
                            data: [125, 98, 72, 54, 42],
                            backgroundColor: ['#F59E0B', '#D97706', '#FBBF24', '#92400E', '#78350F'],
                            borderRadius: 4
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: { x: { beginAtZero: true } }
                    }
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, []);

            return <canvas ref={canvasRef} height={200}></canvas>;
        }

        function RevenueChart({ reps }) {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !window.Chart) return;

                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: reps.map(r => r.name),
                        datasets: [{
                            label: 'Revenue',
                            data: reps.map(r => r.revenue),
                            backgroundColor: '#F59E0B',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [reps]);

            return <canvas ref={canvasRef} height={200}></canvas>;
        }

        // ============= ADMIN LEADS PAGE =============
        function AdminLeads({ navigate }) {
            const [leads, setLeads] = useState([
                { id: 1, name: 'John Homeowner', phone: '555-0101', billAmount: 145, score: 92, status: 'hot', rep: 'John Smith', source: 'Facebook', created: '2026-03-25' },
                { id: 2, name: 'Jane Doe', phone: '555-0102', billAmount: 210, score: 78, status: 'warm', rep: 'Sarah Johnson', source: 'Google', created: '2026-03-25' },
                { id: 3, name: 'Bob Wilson', phone: '555-0103', billAmount: 185, score: 45, status: 'cool', rep: 'Mike Chen', source: 'Referral', created: '2026-03-24' },
                { id: 4, name: 'Alice Brown', phone: '555-0104', billAmount: 220, score: 28, status: 'cold', rep: 'Unassigned', source: 'Website', created: '2026-03-24' }
            ]);
            const [statusFilter, setStatusFilter] = useState('all');
            const [sourceFilter, setSourceFilter] = useState('all');
            const [selectedLead, setSelectedLead] = useState(null);

            const filteredLeads = leads.filter(l => {
                if (statusFilter !== 'all' && l.status !== statusFilter) return false;
                if (sourceFilter !== 'all' && l.source !== sourceFilter) return false;
                return true;
            });

            const getScoreBadge = (score) => {
                if (score >= 80) return <span className="lead-score-hot">HOT ({score})</span>;
                if (score >= 60) return <span className="lead-score-warm">WARM ({score})</span>;
                if (score >= 40) return <span className="lead-score-cool">COOL ({score})</span>;
                return <span className="lead-score-cold">COLD ({score})</span>;
            };

            return (
                <div className="p-4 sm:p-6 space-y-4">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h1 className="text-3xl font-bold solar-dark-text">Leads</h1>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 bg-white rounded-lg shadow p-4">
                        <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="border border-gray-300 rounded px-2 py-1 text-sm">
                            <option value="all">All Status</option>
                            <option value="hot">Hot</option>
                            <option value="warm">Warm</option>
                            <option value="cool">Cool</option>
                            <option value="cold">Cold</option>
                        </select>
                        <select value={sourceFilter} onChange={(e) => setSourceFilter(e.target.value)} className="border border-gray-300 rounded px-2 py-1 text-sm">
                            <option value="all">All Source</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Google">Google</option>
                            <option value="Referral">Referral</option>
                            <option value="Website">Website</option>
                        </select>
                    </div>

                    <div className="bg-white rounded-lg shadow overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 border-b border-gray-200">
                                    <tr>
                                        <th className="text-left py-3 px-4 font-semibold text-gray-700">Name</th>
                                        <th className="text-left py-3 px-4 font-semibold text-gray-700">Phone</th>
                                        <th className="text-left py-3 px-4 font-semibold text-gray-700">Bill</th>
                                        <th className="text-center py-3 px-4 font-semibold text-gray-700">Score</th>
                                        <th className="text-left py-3 px-4 font-semibold text-gray-700">Rep</th>
                                        <th className="text-left py-3 px-4 font-semibold text-gray-700">Source</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredLeads.map(lead => (
                                        <tr key={lead.id} onClick={() => setSelectedLead(lead)} className="border-b border-gray-100 hover:bg-amber-50 cursor-pointer">
                                            <td className="py-3 px-4 font-medium">{lead.name}</td>
                                            <td className="py-3 px-4 text-blue-600">{lead.phone}</td>
                                            <td className="py-3 px-4">${lead.billAmount}</td>
                                            <td className="py-3 px-4 text-center">{getScoreBadge(lead.score)}</td>
                                            <td className="py-3 px-4 text-sm text-gray-600">{lead.rep}</td>
                                            <td className="py-3 px-4 text-xs">{lead.source}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {selectedLead && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={() => setSelectedLead(null)}>
                            <div className="bg-white rounded-lg max-w-2xl w-full max-h-96 overflow-y-auto p-6" onClick={(e) => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-4">
                                    <h2 className="text-2xl font-bold solar-dark-text">{selectedLead.name}</h2>
                                    <button onClick={() => setSelectedLead(null)} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
                                </div>
                                <div className="space-y-4">
                                    <div><strong>Phone:</strong> {selectedLead.phone}</div>
                                    <div><strong>Monthly Bill:</strong> ${selectedLead.billAmount}</div>
                                    <div><strong>Score:</strong> {getScoreBadge(selectedLead.score)}</div>
                                    <div><strong>Status:</strong> {selectedLead.status}</div>
                                    <div><strong>Assigned Rep:</strong> {selectedLead.rep}</div>
                                    <div><strong>Source:</strong> {selectedLead.source}</div>
                                    <div><strong>Created:</strong> {selectedLead.created}</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============= ADMIN APPOINTMENTS (STUB) =============
        function AdminAppointments() {
            return (
                <div className="p-6">
                    <h1 className="text-3xl font-bold solar-dark-text mb-4">Appointments</h1>
                    <p className="text-gray-600">Appointment management</p>
                </div>
            );
        }

        // ============= ADMIN PIPELINE (STUB) =============
        function AdminPipeline() {
            return (
                <div className="p-6">
                    <h1 className="text-3xl font-bold solar-dark-text mb-4">Pipeline</h1>
                    <p className="text-gray-600">Sales pipeline view</p>
                </div>
            );
        }

        // ============= ADMIN RULES (STUB) =============
        function AdminRules() {
            return (
                <div className="p-6">
                    <h1 className="text-3xl font-bold solar-dark-text mb-4">Rules</h1>
                    <p className="text-gray-600">Automation rules</p>
                </div>
            );
        }

        // ============= REP DASHBOARD =============
        function RepDashboard({ user }) {
            const [appointments, setAppointments] = useState([
                { id: 1, time: '09:00 AM', customer: 'John Homeowner', address: '123 Main St', score: 92 },
                { id: 2, time: '11:00 AM', customer: 'Jane Doe', address: '456 Oak Ave', score: 78 },
                { id: 3, time: '02:00 PM', customer: 'Bob Wilson', address: '789 Pine Rd', score: 45 }
            ]);
            const [expandedId, setExpandedId] = useState(null);

            const getScoreColor = (score) => {
                if (score >= 80) return 'bg-red-100 text-red-800';
                if (score >= 60) return 'bg-orange-100 text-orange-800';
                if (score >= 40) return 'bg-yellow-100 text-yellow-800';
                return 'bg-blue-100 text-blue-800';
            };

            return (
                <div className="p-4 space-y-4">
                    <div className="bg-gradient-to-r from-amber-400 to-orange-400 text-white rounded-lg p-6">
                        <div className="text-sm opacity-90">Welcome,</div>
                        <div className="text-2xl font-bold">{user?.name || 'Rep'}</div>
                        <div className="grid grid-cols-3 gap-2 mt-4 text-center text-sm">
                            <div>
                                <div className="text-2xl font-bold">{appointments.length}</div>
                                <div className="opacity-90">Appointments</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold">3</div>
                                <div className="opacity-90">Closes</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold">7</div>
                                <div className="opacity-90">Pending</div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-3">
                        <h2 className="text-xl font-bold solar-dark-text">Today's Schedule</h2>
                        {appointments.map(apt => (
                            <div key={apt.id} className="bg-white rounded-lg shadow border-l-4 border-amber-400">
                                <button
                                    onClick={() => setExpandedId(expandedId === apt.id ? null : apt.id)}
                                    className="w-full text-left p-4 hover:bg-gray-50"
                                >
                                    <div className="flex items-center justify-between">
                                        <div className="flex-1">
                                            <div className="text-sm text-gray-500">{apt.time}</div>
                                            <div className="font-semibold text-gray-900">{apt.customer}</div>
                                            <div className="text-sm text-gray-600">{apt.address}</div>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-xs font-semibold ${getScoreColor(apt.score)}`}>
                                            {apt.score}
                                        </span>
                                    </div>
                                </button>

                                {expandedId === apt.id && (
                                    <div className="border-t border-gray-200 p-4 bg-gray-50 space-y-3">
                                        <button className="w-full bg-blue-500 text-white py-2 rounded font-medium text-sm">📍 Get Directions</button>
                                        <button className="w-full bg-green-500 text-white py-2 rounded font-medium text-sm">✓ Mark Complete</button>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ============= CONFIRMATION QUEUE (STUB) =============
        function ConfirmationQueue() {
            return (
                <div className="p-6">
                    <h1 className="text-3xl font-bold solar-dark-text mb-4">Confirmation Queue</h1>
                    <p className="text-gray-600">Appointment confirmation system</p>
                </div>
            );
        }

        // ============= MAIN APP COMPONENT =============
        function App() {
            const [user, setUser] = useState(null);
            const [toast, setToast] = useState(null);
            const [publicData, setPublicData] = useState({
                formData: null,
                analysis: null,
                booking: null
            });

            const handleLogout = () => {
                window.authToken = null;
                setUser(null);
                window.location.hash = '/login';
            };

            return (
                <HashRouter>
                    {({ hash, navigate }) => {
                        // Public routes - no authentication required
                        const isPublicRoute = ['/', '/upload', '/savings', '/book', '/faq'].some(route => hash === route);

                        // Internal routes - authentication required
                        const isInternalRoute = hash.startsWith('/admin') || hash.startsWith('/rep') || hash.startsWith('/confirmation');

                        // Check authentication for internal routes
                        if (isInternalRoute && !user) {
                            navigate('/login');
                            return null;
                        }

                        // Public routes
                        if (hash === '/') {
                            return (
                                <>
                                    <PublicNav navigate={navigate} />
                                    <Homepage navigate={navigate} />
                                </>
                            );
                        }

                        if (hash === '/upload') {
                            return (
                                <>
                                    <PublicNav navigate={navigate} />
                                    <BillUpload navigate={navigate} publicData={publicData} setPublicData={setPublicData} />
                                </>
                            );
                        }

                        if (hash === '/savings') {
                            return (
                                <>
                                    <PublicNav navigate={navigate} />
                                    <SavingsResult navigate={navigate} publicData={publicData} setPublicData={setPublicData} />
                                </>
                            );
                        }

                        if (hash === '/book') {
                            return (
                                <>
                                    <PublicNav navigate={navigate} />
                                    <BookingFlow navigate={navigate} publicData={publicData} setPublicData={setPublicData} />
                                </>
                            );
                        }

                        if (hash === '/faq') {
                            return (
                                <>
                                    <PublicNav navigate={navigate} />
                                    <FAQPage navigate={navigate} />
                                </>
                            );
                        }

                        // Login page
                        if (hash === '/login') {
                            return <LoginPage navigate={navigate} setUser={setUser} />;
                        }

                        // Internal OS routes
                        if (user) {
                            return (
                                <div className="app-wrapper">
                                    <TopBar user={user} navigate={navigate} onLogout={handleLogout} />
                                    <Sidebar role={user.role} navigate={navigate} activeHash={hash} />
                                    <BottomNav role={user.role} navigate={navigate} activeHash={hash} />
                                    <main className="main-content">
                                        {hash === '/admin/dashboard' && <AdminDashboard navigate={navigate} />}
                                        {hash === '/admin/leads' && <AdminLeads navigate={navigate} />}
                                        {hash === '/admin/appointments' && <AdminAppointments />}
                                        {hash === '/admin/pipeline' && <AdminPipeline />}
                                        {hash === '/admin/rules' && <AdminRules />}
                                        {hash === '/rep/dashboard' && <RepDashboard user={user} navigate={navigate} />}
                                        {hash === '/confirmation/queue' && <ConfirmationQueue />}
                                        {!hash.match(/^\/admin|^\/rep|^\/confirmation/) && (
                                            <div className="p-6 text-center">
                                                <p className="text-gray-600">Page not found</p>
                                                <button onClick={() => navigate(user.role === 'admin' ? '/admin/dashboard' : '/rep/dashboard')} className="solar-primary text-white px-4 py-2 rounded mt-4">
                                                    Go Home
                                                </button>
                                            </div>
                                        )}
                                    </main>
                                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                                </div>
                            );
                        }

                        // Default to login if hash doesn't match any route
                        return <LoginPage navigate={navigate} setUser={setUser} />;
                    }}
                </HashRouter>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
